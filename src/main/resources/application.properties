# ============================================================
# Church Admin — Application Configuration
# ============================================================

# --- Application ---
spring.application.name=Church Admin
app.version=1.0.0

# --- SQLite Database ---
spring.datasource.url=jdbc:sqlite:${user.home}/.churchadmin/church_admin.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# SQLite does not support sequences — use TABLE strategy for @GeneratedValue
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# --- Snapshots ---
snapshots.dir=${user.home}/.churchadmin/snapshots
snapshots.retention.auto-daily=30
snapshots.retention.pre-import=10

# --- i18n ---
# Default locale; overridden at runtime by LocaleService from user prefs
app.locale.default=en
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# --- Logging ---
logging.level.com.churchadmin=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.file.name=${user.home}/.churchadmin/logs/church-admin.log
